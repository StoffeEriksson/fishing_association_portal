{% extends "portal/base.html" %}

{% block title %}Signera dokument{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-4 gap-3">
  <div>
    <h1 class="page-title h2 mb-1">Signera dokument</h1>
    <div class="muted-label">
      Dokument: {{ signature.document.title }}
    </div>
  </div>

  <div class="d-flex gap-2">
    <a href="{% url 'portal:document_detail' signature.document.pk %}" class="btn btn-outline-secondary">
      Tillbaka
    </a>
  </div>
</div>

<div class="card shadow-soft">
  <div class="card-body p-4">
    <div class="mb-4">
      <div class="small text-muted">Din roll</div>
      <div class="fw-semibold">{{ signature.get_role_display }}</div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-dark">
          Signera
        </button>
        <a href="{% url 'portal:document_detail' signature.document.pk %}" class="btn btn-outline-secondary">
          Avbryt
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
