{% load static %}
<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Logga ut | FVO Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="auth-page">

<div class="auth-shell">
  <div class="auth-card card shadow-lg border-0">
    <div class="card-body p-4 p-md-5 text-center">
      <div class="mb-3" style="font-size: 2.5rem;">
        🔐
        </div>  
      <h1 class="auth-brand mb-2">FVO Portal</h1>
      <p class="auth-subtitle mb-4">
        Du är på väg att logga ut från systemet.
      </p>

      <h2 class="auth-title mb-3">Logga ut</h2>
      <p class="text-muted mb-4">
        Är du säker på att du vill logga ut?
      </p>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}

        {% if redirect_field_value %}
          <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
        {% endif %}

        <div class="d-grid gap-2 mb-3">
          <button type="submit" class="btn btn-dark btn-lg auth-submit-btn">
            Ja, logga ut
          </button>

          <a href="{% url 'portal:dashboard' %}" class="btn btn-outline-secondary auth-submit-btn">
            Avbryt
          </a>
        </div>
      </form>

    </div>
  </div>
</div>

</body>
</html>
