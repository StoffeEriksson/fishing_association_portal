{% extends "portal/base.html" %}

{% block title %}Ny observation{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <h1 class="h3 mb-1">Ny observation</h1>
      <div class="text-muted small">Skapa en ny observation i fiskevårdsmodulen.</div>
    </div>
    <a href="{% url 'fisheries:observation_list' %}" class="btn btn-outline-secondary btn-sm">
      Tillbaka till lista
    </a>
  </div>

  <div class="card shadow-soft">
    <div class="card-body">
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_title" class="form-label">Titel</label>
          <input id="id_title" name="title" type="text" class="form-control" value="{{ form_data.title|default:'' }}" required>
        </div>

        <div class="mb-3">
          <label for="id_category" class="form-label">Kategori</label>
          <select id="id_category" name="category" class="form-select">
            {% for value, label in category_choices %}
              <option value="{{ value }}" {% if form_data.category == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label for="id_water_body" class="form-label">Vatten</label>
          <select id="id_water_body" name="water_body" class="form-select">
            <option value="">—</option>
            {% for water in water_bodies %}
              <option value="{{ water.pk }}" {% if form_data.water_body == water.pk|stringformat:"s" %}selected{% endif %}>
                {{ water.name }}
              </option>
            {% endfor %}
          </select>
        </div>

        <div class="mb-3">
          <label for="id_description" class="form-label">Beskrivning</label>
          <textarea id="id_description" name="description" class="form-control" rows="4">{{ form_data.description|default:'' }}</textarea>
        </div>

        <button type="submit" class="btn btn-dark">Skapa observation</button>
      </form>
    </div>
  </div>
{% endblock %}
